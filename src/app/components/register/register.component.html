<div class="register-container">
    <div class="register-card glass-panel">
      <div class="logo-area">
        <div class="water-drop">💧</div>
        <h1>Watercycle</h1>
        <p>Crea tu cuenta para empezar a explorar</p>
      </div>
  
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register-form">
        <div class="form-group">
          <label for="name">Nombre Completo</label>
          <input type="text" id="name" formControlName="name" placeholder="Tu nombre" 
                 [class.error]="registerForm.get('name')?.invalid && registerForm.get('name')?.touched">
          <span class="error-msg" *ngIf="registerForm.get('name')?.invalid && registerForm.get('name')?.touched">
            El nombre es requerido (mínimo 3 caracteres).
          </span>
        </div>

        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <input type="email" id="email" formControlName="email" placeholder="ejemplo@mail.com"
                 [class.error]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
          <span class="error-msg" *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
            Por favor, ingresa un correo válido.
          </span>
        </div>
  
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" formControlName="password" placeholder="••••••••"
                 [class.error]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
          <span class="error-msg" *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
            La contraseña debe tener al menos 6 caracteres.
          </span>
        </div>

        <div class="form-group">
            <label for="confirmPassword">Confirmar Contraseña</label>
            <input type="password" id="confirmPassword" formControlName="confirmPassword" placeholder="••••••••"
                   [class.error]="registerForm.hasError('mismatch') && registerForm.get('confirmPassword')?.touched">
            <span class="error-msg" *ngIf="registerForm.hasError('mismatch') && registerForm.get('confirmPassword')?.touched">
              Las contraseñas no coinciden.
            </span>
          </div>
  
        <div *ngIf="errorMessage" class="error-banner">
          {{ errorMessage }}
        </div>
  
        <button type="submit" class="register-btn" [disabled]="loading">
          {{ loading ? 'Registrando...' : 'Registrarse' }}
        </button>
      </form>
  
      <div class="register-footer">
        <p>¿Ya tienes cuenta? <a routerLink="/login">Inicia Sesión</a></p>
      </div>
    </div>
  </div>
