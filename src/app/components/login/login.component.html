<div class="login-container">
  
  <!-- Decorative background elements -->
  <div class="orb orb-blue"></div>
  <div class="orb orb-purple"></div>

  <div class="glass-panel login-card">
    <div class="header">
      <h1 class="text-neon-blue">H₂O Simulador</h1>
      <p class="subtitle">Estrategia Pedagógica - Pensamiento Sistémico</p>
      <h2 class="text-neon-purple mt-2">Iniciar Sesión</h2>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" formControlName="email" placeholder="Ingrese su correo" autocomplete="off" />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" formControlName="password" placeholder="Ingrese su contraseña" />
      </div>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn-neon mt-4">INGRESAR</button>
    </form>
  </div>
</div>
